<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OBGYN Lectures</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17212b;
      --muted: #5d6a75;
      --line: #d9e6ef;
      --blue: #12324a;
      --soft: #f3f8fc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #ffffff;
      line-height: 1.5;
    }
    header {
      padding: 56px 24px 32px;
      background: linear-gradient(180deg, #eef7fc 0%, #ffffff 100%);
      border-bottom: 1px solid var(--line);
    }
    .wrap { max-width: 980px; margin: 0 auto; }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.4rem, 7vw, 5rem);
      line-height: 0.98;
      letter-spacing: 0;
      color: var(--blue);
    }
    .lead {
      margin: 0;
      max-width: 720px;
      color: var(--muted);
      font-size: 1.1rem;
    }
    main { padding: 32px 24px 64px; }
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--blue);
      text-decoration: none;
      font-weight: 650;
      background: #fff;
    }
    a.button:hover { background: var(--soft); }
    .lecture-list {
      display: grid;
      gap: 14px;
    }
    .lecture {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      background: #fff;
    }
    .lecture h2 {
      margin: 0 0 8px;
      color: var(--blue);
      font-size: 1.25rem;
      line-height: 1.25;
    }
    .lecture p {
      margin: 0 0 14px;
      color: var(--muted);
    }
    .links { display: flex; gap: 10px; flex-wrap: wrap; }
    footer {
      border-top: 1px solid var(--line);
      color: var(--muted);
      padding: 20px 24px 40px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>OBGYN Lectures</h1>
    </div>
  </header>
  <main>
    <div class="wrap">
      <div class="toolbar">
        <a class="button" href="https://www.youtube.com/playlist?list=PLaCK3nTYIR6hOC6s9efhtXh5KaNpxDrbh">YouTube playlist</a>
      </div>
      <section class="lecture-list" aria-label="Lecture handouts">
        <article class="lecture">
          <h2>01 - Antepartum Fetal Testing: NST, BPP, and Modified BPP</h2>
          <p>Readable companion transcript for lecture 1.</p>
          <div class="links">
            <a class="button" href="pdfs/01-antepartum-fetal-testing-nst-bpp-modified-bpp.pdf">Read</a>
            <a class="button" href="https://youtu.be/XyrQDhBJIQg">Listen</a>
          </div>
        </article>
      </section>
    </div>
  </main>
  <footer>
    <div class="wrap">OBGYN Lectures companion materials.</div>
  </footer>
</body>
</html>
